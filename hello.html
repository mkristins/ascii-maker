<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Hello!</title>
  </head>
  <body>
    <h1>Hello from Rust!</h1>
    <p>This page was served using <strong>std::net</strong>.</p>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <div>
        <label for="image">Image</label>
        <input type="file" name="image" accept="image/*">
      </div>
      
      <div>
        <label for="targetH"> Target H </label>
        <input type="number" name="targetH" placeholder="128" value="128"/>
      </div>

      <div>
        <label for="targetW"> Target W </label>
        <input type="number" name="targetW" placeholder="128" value="128"/>
      </div>
      
      <div>
        <label for="alphabet"> Alphabet </label>
        <input type="text" name="alphabet" value=".!=#"/>
      </div>
      <button type="submit">Upload!</button>
    </form>
  </body>
</html>
